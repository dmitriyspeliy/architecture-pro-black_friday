name: mongo-sharding-repl

services:
  configSrv1:
    image: dh-mirror.gitverse.ru/mongo:latest
    hostname: configSrv1
    command:
      [
        "mongod",
        "--configsvr",
        "--replSet",
        "cfgReplSet",
        "--port",
        "27017",
        "--bind_ip_all"
      ]
    volumes:
      - configSrv1_data:/data/db

  configSrv2:
    image: dh-mirror.gitverse.ru/mongo:latest
    hostname: configSrv2
    command:
      [
        "mongod",
        "--configsvr",
        "--replSet",
        "cfgReplSet",
        "--port",
        "27017",
        "--bind_ip_all"
      ]
    volumes:
      - configSrv2_data:/data/db

  configSrv3:
    image: dh-mirror.gitverse.ru/mongo:latest
    hostname: configSrv3
    command:
      [
        "mongod",
        "--configsvr",
        "--replSet",
        "cfgReplSet",
        "--port",
        "27017",
        "--bind_ip_all"
      ]
    volumes:
      - configSrv3_data:/data/db

  shard1-1:
    image: dh-mirror.gitverse.ru/mongo:latest
    hostname: shard1-1
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet",
        "shard1ReplSet",
        "--port",
        "27017",
        "--bind_ip_all"
      ]
    volumes:
      - shard1_1_data:/data/db

  shard1-2:
    image: dh-mirror.gitverse.ru/mongo:latest
    hostname: shard1-2
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet",
        "shard1ReplSet",
        "--port",
        "27017",
        "--bind_ip_all"
      ]
    volumes:
      - shard1_2_data:/data/db

  shard1-3:
    image: dh-mirror.gitverse.ru/mongo:latest
    hostname: shard1-3
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet",
        "shard1ReplSet",
        "--port",
        "27017",
        "--bind_ip_all"
      ]
    volumes:
      - shard1_3_data:/data/db

  shard2-1:
    image: dh-mirror.gitverse.ru/mongo:latest
    hostname: shard2-1
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet",
        "shard2ReplSet",
        "--port",
        "27017",
        "--bind_ip_all"
      ]
    volumes:
      - shard2_1_data:/data/db

  shard2-2:
    image: dh-mirror.gitverse.ru/mongo:latest
    hostname: shard2-2
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet",
        "shard2ReplSet",
        "--port",
        "27017",
        "--bind_ip_all"
      ]
    volumes:
      - shard2_2_data:/data/db

  shard2-3:
    image: dh-mirror.gitverse.ru/mongo:latest
    hostname: shard2-3
    command:
      [
        "mongod",
        "--shardsvr",
        "--replSet",
        "shard2ReplSet",
        "--port",
        "27017",
        "--bind_ip_all"
      ]
    volumes:
      - shard2_3_data:/data/db

  mongos:
    image: dh-mirror.gitverse.ru/mongo:latest
    hostname: mongos
    depends_on:
      - configSrv1
      - configSrv2
      - configSrv3
      - shard1-1
      - shard1-2
      - shard1-3
      - shard2-1
      - shard2-2
      - shard2-3
    command:
      [
        "mongos",
        "--configdb",
        "cfgReplSet/configSrv1:27017,configSrv2:27017,configSrv3:27017",
        "--bind_ip_all",
        "--port",
        "27017"
      ]
    ports:
      - "27017:27017"

  pymongo_api:
    image: kazhem/pymongo_api:1.0.0
    depends_on:
      - mongos
    ports:
      - "8080:8080"
    environment:
      MONGODB_URL: "mongodb://mongos:27017"
      MONGODB_DATABASE_NAME: "somedb"

volumes:
  configSrv1_data:
  configSrv2_data:
  configSrv3_data:
  shard1_1_data:
  shard1_2_data:
  shard1_3_data:
  shard2_1_data:
  shard2_2_data:
  shard2_3_data: